<svg viewBox="0 0 540 420" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Student dashboard illustration">
  <defs>
    <linearGradient id="dRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="dBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#4F46E5"/><stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="dS" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4F46E5" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- backdrop + accents -->
  <rect x="70" y="46" width="400" height="320" rx="64" fill="#E0E7FF" transform="rotate(-6 270 206)"/>
  <circle cx="452" cy="120" r="10" fill="#F59E0B"/>
  <circle cx="86" cy="300" r="8" fill="#10B981"/>
  <circle cx="470" cy="300" r="6" fill="#0EA5E9"/>
  <circle cx="112" cy="120" r="6" fill="#4F46E5" opacity=".5"/>

  <!-- main window -->
  <g filter="url(#dS)"><rect x="130" y="96" width="280" height="220" rx="20" fill="#FFFFFF"/></g>
  <rect x="130" y="96" width="280" height="44" rx="20" fill="#F1F5F9"/>
  <rect x="130" y="120" width="280" height="20" fill="#F1F5F9"/>
  <circle cx="152" cy="118" r="5" fill="#F43F5E"/>
  <circle cx="170" cy="118" r="5" fill="#F59E0B"/>
  <circle cx="188" cy="118" r="5" fill="#10B981"/>

  <!-- donut ring -->
  <circle cx="200" cy="212" r="40" stroke="#E2E8F0" stroke-width="14" fill="none"/>
  <circle cx="200" cy="212" r="40" stroke="url(#dRing)" stroke-width="14" fill="none" stroke-linecap="round"
          stroke-dasharray="180 252" transform="rotate(-90 200 212)"/>
  <text x="200" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1E293B">72%</text>

  <!-- mini bar chart -->
  <rect x="270" y="196" width="18" height="16" rx="5" fill="url(#dBar)"/>
  <rect x="296" y="182" width="18" height="30" rx="5" fill="url(#dBar)"/>
  <rect x="322" y="162" width="18" height="50" rx="5" fill="url(#dBar)"/>
  <rect x="348" y="186" width="18" height="26" rx="5" fill="url(#dBar)"/>

  <!-- text lines -->
  <rect x="160" y="268" width="120" height="10" rx="5" fill="#E2E8F0"/>
  <rect x="160" y="286" width="80" height="10" rx="5" fill="#EDEFF3"/>

  <!-- floating checklist card -->
  <g filter="url(#dS)"><rect x="330" y="58" width="152" height="106" rx="16" fill="#FFFFFF"/></g>
  <circle cx="354" cy="88" r="9" fill="#10B981"/>
  <path d="M350 88l3 3 5-6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="370" y="83" width="90" height="9" rx="4.5" fill="#E2E8F0"/>
  <circle cx="354" cy="116" r="9" fill="#10B981"/>
  <path d="M350 116l3 3 5-6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="370" y="111" width="74" height="9" rx="4.5" fill="#E2E8F0"/>
  <circle cx="354" cy="144" r="9" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <rect x="370" y="139" width="84" height="9" rx="4.5" fill="#EDEFF3"/>

  <!-- floating chat bubble -->
  <g filter="url(#dS)"><rect x="66" y="248" width="132" height="72" rx="16" fill="#4F46E5"/></g>
  <path d="M92 320v20l20-18z" fill="#4F46E5"/>
  <rect x="84" y="270" width="98" height="9" rx="4.5" fill="#fff" opacity=".92"/>
  <rect x="84" y="288" width="68" height="9" rx="4.5" fill="#fff" opacity=".6"/>

  <!-- little plant -->
  <path d="M432 302c-14 0-16-20-4-24 2 12 4 16 4 24z" fill="#10B981"/>
  <path d="M432 302c14 0 16-24 3-30-2 14-3 20-3 30z" fill="#34D399"/>
  <path d="M420 302h24l-3 22h-18z" fill="#F59E0B"/>
</svg>
